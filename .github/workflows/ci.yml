name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lattice-commit
        run: |
          python -m pip install --upgrade pip
          pip install lattice-commit pytest

      - name: Verify import
        run: python -c "from lattice_commit import incremental_repair; print(incremental_repair.__doc__[:80])"

      - name: Verify CLI installed
        run: lattice-commit --help

      - name: Run smoke tests
        run: pytest tests/ -q
        continue-on-error: true
        # continue-on-error because tests/ is a stub at v0.1.0; will tighten in v0.2
